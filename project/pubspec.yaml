name: project
description: A Flutter Firebase project

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.3.0
  image_picker: ^1.0.7
  permission_handler: ^11.0.0
  flutter_local_notifications: ^17.2.2
  # 💾 Local storage (login remember system)
  shared_preferences: ^2.2.3

  # 📱 UI icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true